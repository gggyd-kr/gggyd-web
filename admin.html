<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Editor — 감각공예단</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --border-dark: #c0c0c0;
      --text: #111;
      --text-muted: #888;
      --accent: #111;
      --accent-fg: #fff;
      --danger: #c0392b;
      --radius: 6px;
      --font: 'DM Sans', -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-logo {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .topbar-sep { color: var(--border-dark); }

    .topbar-title {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .topbar-right { display: flex; gap: 10px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 500;
      border-radius: var(--radius);
      border: 1px solid var(--border-dark);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }

    .btn:hover { background: #f0f0f0; }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }

    .btn-primary:hover { background: #333; border-color: #333; }

    .btn-danger {
      background: none;
      color: var(--danger);
      border-color: #e8b0ab;
    }

    .btn-danger:hover { background: #fdf0ef; }

    .btn-sm { padding: 5px 11px; font-size: 0.75rem; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .panel-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Works list ── */
    .works-list { padding: 8px 0; }

    .work-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--bg);
      cursor: pointer;
      transition: background 0.1s;
    }

    .work-row:last-child { border-bottom: none; }
    .work-row:hover { background: var(--bg); }
    .work-row.selected { background: #f0f0ee; }

    .work-row-thumb {
      width: 44px;
      height: 54px;
      object-fit: cover;
      border-radius: 3px;
      background: var(--border);
      flex-shrink: 0;
    }

    .work-row-thumb.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border-dark);
      font-size: 18px;
    }

    .work-row-info { flex: 1; min-width: 0; }

    .work-row-title {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .work-row-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .category-badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .work-row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .work-row:hover .work-row-actions { opacity: 1; }

    /* ── Form ── */
    .form-body { padding: 20px; }

    .form-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
      letter-spacing: 0.02em;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 8px 12px;
      font-family: var(--font);
      font-size: 0.85rem;
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .thumb-preview {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      border-radius: var(--radius);
      background: var(--bg);
      border: 1px solid var(--border);
      margin-top: 8px;
      display: none;
    }

    .thumb-preview.visible { display: block; }

    .form-actions {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Export section ── */
    .export-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 24px;
      grid-column: 1 / -1;
    }

    .export-section h3 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .export-section p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .export-section .steps {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-fg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .export-actions { display: flex; gap: 10px; align-items: center; }

    .export-status {
      font-size: 0.78rem;
      color: #2ecc71;
      display: none;
    }

    .export-status.visible { display: block; }

    /* ── Empty state ── */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: var(--accent-fg);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 0.82rem;
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Delete confirm ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.visible { display: flex; }

    .confirm-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 360px;
      width: 90%;
    }

    .confirm-box h3 { font-size: 1rem; margin-bottom: 8px; }
    .confirm-box p { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .confirm-box .btns { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">감각공예단</span>
    <span class="topbar-sep">·</span>
    <span class="topbar-title">Work Editor</span>
  </div>
  <div class="topbar-right">
    <a href="work.html" class="btn btn-sm" target="_blank">↗ Work 페이지 미리보기</a>
  </div>
</div>

<!-- Main layout -->
<div class="layout">

  <!-- Works List -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <h2>Works</h2>
          <span class="panel-count" id="countBadge">0</span>
        </div>
        <button class="btn btn-primary btn-sm" id="btnNew">+ 새 작업 추가</button>
      </div>
      <div class="works-list" id="worksList"></div>
    </div>
  </div>

  <!-- Form Panel -->
  <div>
    <div class="panel" id="formPanel">
      <div class="panel-header">
        <h2 id="formPanelTitle">항목 선택</h2>
      </div>
      <div id="formBody">
        <div class="empty">← 왼쪽에서 항목을 선택하거나<br>새 작업을 추가하세요</div>
      </div>
    </div>
  </div>

  <!-- Export -->
  <div class="export-section">
    <h3>저장 & 배포</h3>
    <p>에디터에서의 변경사항은 이 브라우저에 임시 저장됩니다. 실제 사이트에 반영하려면 아래 순서를 따라주세요.</p>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <span><strong>works.json 다운로드</strong> 버튼 클릭</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>다운로드된 파일을 <code>data/works.json</code>으로 교체</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>git commit & push → Vercel 자동 배포</span>
      </div>
    </div>
    <div class="export-actions">
      <button class="btn btn-primary" id="btnExport">↓ works.json 다운로드</button>
      <button class="btn" id="btnReset">초기화 (원본 복구)</button>
      <span class="export-status" id="exportStatus">✓ 다운로드 완료</span>
    </div>
  </div>

</div>

<!-- Delete confirm -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>정말 삭제할까요?</h3>
    <p id="confirmMsg">이 작업을 삭제하면 되돌릴 수 없습니다.</p>
    <div class="btns">
      <button class="btn" id="confirmCancel">취소</button>
      <button class="btn btn-danger" id="confirmOk">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = "gggyd_works";
const SOURCE_URL  = "data/works.json";

const CATEGORIES = {
  "designed-made": "Designed & Made by Us",
  "designed":      "Designed by Us",
  "fabrication":   "Fabrication Partner",
};

let works = [];
let editingId = null;
let deleteTarget = null;

// ── Storage ─────────────────────────────────
function load() {
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : null;
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(works));
}

function slugify(str) {
  return str.toLowerCase()
    .replace(/[^a-z0-9가-힣\s-]/g, "")
    .trim()
    .replace(/\s+/g, "-");
}

// ── Render list ──────────────────────────────
function renderList() {
  const el = document.getElementById("worksList");
  const count = document.getElementById("countBadge");
  const sorted = [...works].sort((a, b) => b.year - a.year);

  count.textContent = works.length;

  if (!works.length) {
    el.innerHTML = '<div class="empty">작업이 없습니다.<br>+ 새 작업 추가로 시작하세요.</div>';
    return;
  }

  el.innerHTML = sorted.map(w => `
    <div class="work-row ${editingId === w.id ? 'selected' : ''}" data-id="${w.id}">
      ${w.thumbnail
        ? `<img class="work-row-thumb" src="${w.thumbnail}" alt="" onerror="this.style.display='none'">`
        : `<div class="work-row-thumb placeholder">□</div>`}
      <div class="work-row-info">
        <div class="work-row-title">${w.title}</div>
        <div class="work-row-meta">
          <span class="category-badge">${CATEGORIES[w.category] || w.category}</span>
          &nbsp;${w.year}${w.client ? ' · ' + w.client : ''}
        </div>
      </div>
      <div class="work-row-actions">
        <button class="btn btn-sm btn-danger" data-del="${w.id}" title="삭제">✕</button>
      </div>
    </div>
  `).join("");

  el.querySelectorAll(".work-row").forEach(row => {
    row.addEventListener("click", e => {
      if (e.target.dataset.del) return;
      openEdit(e.currentTarget.dataset.id);
    });
  });

  el.querySelectorAll("[data-del]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      confirmDelete(e.currentTarget.dataset.del);
    });
  });
}

// ── Form ─────────────────────────────────────
function openNew() {
  editingId = null;
  renderForm(null);
  renderList();
}

function openEdit(id) {
  editingId = id;
  renderForm(works.find(w => w.id === id));
  renderList();
}

function renderForm(work) {
  const isNew = !work;
  document.getElementById("formPanelTitle").textContent = isNew ? "새 작업 추가" : "작업 수정";

  const tagsVal = work ? work.tags.join(", ") : "";
  const clientVal = work?.client || "";
  const thumbVal  = work?.thumbnail || "";

  document.getElementById("formBody").innerHTML = `
    <div class="form-body">
      <div class="field">
        <label>제목 *</label>
        <input id="fTitle" type="text" value="${work?.title || ''}" placeholder="Flower Side Table">
      </div>
      <div class="field-row">
        <div class="field">
          <label>카테고리 *</label>
          <select id="fCategory">
            <option value="designed-made" ${work?.category==='designed-made'?'selected':''}>Designed & Made by Us</option>
            <option value="designed"      ${work?.category==='designed'?'selected':''}>Designed by Us</option>
            <option value="fabrication"   ${work?.category==='fabrication'?'selected':''}>Fabrication Partner</option>
          </select>
        </div>
        <div class="field">
          <label>연도 *</label>
          <input id="fYear" type="number" value="${work?.year || new Date().getFullYear()}" min="2000" max="2099">
        </div>
      </div>
      <div class="field">
        <label>클라이언트 (없으면 비워두기)</label>
        <input id="fClient" type="text" value="${clientVal}" placeholder="OO Architecture Studio">
      </div>
      <div class="field">
        <label>태그 (쉼표로 구분)</label>
        <input id="fTags" type="text" value="${tagsVal}" placeholder="Furniture, Object">
      </div>
      <div class="field">
        <label>썸네일 이미지 URL</label>
        <input id="fThumb" type="text" value="${thumbVal}" placeholder="https://...">
        <img class="thumb-preview ${thumbVal ? 'visible' : ''}" id="thumbPreview" src="${thumbVal}">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btnSave">${isNew ? '추가' : '저장'}</button>
      <button class="btn" id="btnCancel">취소</button>
    </div>
  `;

  // live thumbnail preview
  document.getElementById("fThumb").addEventListener("input", e => {
    const preview = document.getElementById("thumbPreview");
    const val = e.target.value.trim();
    if (val) {
      preview.src = val;
      preview.classList.add("visible");
    } else {
      preview.classList.remove("visible");
    }
  });

  document.getElementById("btnSave").addEventListener("click", saveForm);
  document.getElementById("btnCancel").addEventListener("click", () => {
    editingId = null;
    document.getElementById("formPanelTitle").textContent = "항목 선택";
    document.getElementById("formBody").innerHTML = '<div class="empty">← 왼쪽에서 항목을 선택하거나<br>새 작업을 추가하세요</div>';
    renderList();
  });
}

function saveForm() {
  const title  = document.getElementById("fTitle").value.trim();
  const cat    = document.getElementById("fCategory").value;
  const year   = document.getElementById("fYear").value.trim();
  const client = document.getElementById("fClient").value.trim();
  const tagsRaw= document.getElementById("fTags").value.trim();
  const thumb  = document.getElementById("fThumb").value.trim();

  if (!title || !year) { toast("제목과 연도는 필수입니다."); return; }

  const tags = tagsRaw ? tagsRaw.split(",").map(t => t.trim()).filter(Boolean) : [];

  if (editingId) {
    const idx = works.findIndex(w => w.id === editingId);
    if (idx !== -1) {
      works[idx] = { ...works[idx], title, category: cat, year, client: client || null, tags, thumbnail: thumb };
      toast("저장됐어요!");
    }
  } else {
    const id = slugify(title) || ("work-" + Date.now());
    works.push({ id, title, category: cat, year, client: client || null, tags, thumbnail: thumb });
    editingId = id;
    toast("추가됐어요!");
  }

  save();
  renderList();
  openEdit(editingId);
}

// ── Delete ───────────────────────────────────
function confirmDelete(id) {
  deleteTarget = id;
  const w = works.find(x => x.id === id);
  document.getElementById("confirmMsg").textContent =
    `"${w?.title}"을(를) 삭제합니다. 이 작업은 되돌릴 수 없습니다.`;
  document.getElementById("confirmOverlay").classList.add("visible");
}

document.getElementById("confirmCancel").addEventListener("click", () => {
  document.getElementById("confirmOverlay").classList.remove("visible");
  deleteTarget = null;
});

document.getElementById("confirmOk").addEventListener("click", () => {
  if (!deleteTarget) return;
  works = works.filter(w => w.id !== deleteTarget);
  if (editingId === deleteTarget) {
    editingId = null;
    document.getElementById("formPanelTitle").textContent = "항목 선택";
    document.getElementById("formBody").innerHTML = '<div class="empty">← 왼쪽에서 항목을 선택하거나<br>새 작업을 추가하세요</div>';
  }
  save();
  renderList();
  document.getElementById("confirmOverlay").classList.remove("visible");
  deleteTarget = null;
  toast("삭제됐어요.");
});

// ── Export ───────────────────────────────────
document.getElementById("btnExport").addEventListener("click", () => {
  const json  = JSON.stringify(works, null, 2);
  const blob  = new Blob([json], { type: "application/json" });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement("a");
  a.href = url; a.download = "works.json"; a.click();
  URL.revokeObjectURL(url);

  const status = document.getElementById("exportStatus");
  status.classList.add("visible");
  setTimeout(() => status.classList.remove("visible"), 2500);
});

document.getElementById("btnReset").addEventListener("click", () => {
  if (!confirm("localStorage를 초기화하고 원본 works.json으로 돌아갑니다. 계속할까요?")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
});

// ── Toast ─────────────────────────────────────
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

// ── Init ──────────────────────────────────────
async function init() {
  const stored = load();
  if (stored) {
    works = stored;
  } else {
    const res = await fetch(SOURCE_URL);
    works = await res.json();
  }
  renderList();
}

document.getElementById("btnNew").addEventListener("click", openNew);
init();
</script>
</body>
</html>
