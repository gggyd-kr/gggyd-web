    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

      const container = document.getElementById('hero-3d');
      const canvas = document.getElementById('hero-canvas');

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);

      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

      const camera = new THREE.PerspectiveCamera(42, container.clientWidth / container.clientHeight, 0.01, 200);
      camera.position.set(0, 1.2, 16);
      camera.lookAt(0, 0, 0);

      // 조명
      const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
      dirLight.position.set(5, 8, 6);
      scene.add(dirLight);
      const fillLight = new THREE.DirectionalLight(0xfff0d0, 0.6);
      fillLight.position.set(-6, 2, -4);
      scene.add(fillLight);
      scene.add(new THREE.AmbientLight(0xffffff, 0.4));

      const FLOOR_Y = -1.8; // 모든 모델의 바닥 기준 Y값

      const modelDefs = [
        { path: 'models/towelpalace.glb', x: -6.5, initY:  0.3,  rotSpeed: 0.004 },
        { path: 'models/pingpong.glb',    x:  0.2, initY:  0,    rotSpeed: 0.005 },
        { path: 'models/oriontable.glb',  x:  6.2, initY: -0.4,  rotSpeed: 0.003 },
      ];

      const objects = [];
      const loader = new GLTFLoader();
      const TARGET_SIZE = 5.0; // 목표 크기 (최대 치수 기준)
      const MAX_WIDTH = 5.5;   // 최대 폭 제한

      function loadModel(def) {
        return new Promise((resolve) => {
          loader.load(def.path, (gltf) => {
            const obj = gltf.scene;

            // 정규화: 모델 중심을 (0,0,0)으로 이동 후 스케일
            const box0 = new THREE.Box3().setFromObject(obj);
            const center0 = box0.getCenter(new THREE.Vector3());

            // 자식 메시들을 모두 중심으로 이동 (pivot 보정)
            obj.traverse(child => {
              if (child.isMesh) {
                child.geometry.translate(-center0.x / (obj.scale.x || 1), -center0.y / (obj.scale.y || 1), -center0.z / (obj.scale.z || 1));
              }
            });

            // 스케일 결정
            const box1 = new THREE.Box3().setFromObject(obj);
            const size = box1.getSize(new THREE.Vector3());
            let scale = TARGET_SIZE / Math.max(size.x, size.y, size.z);
            const projectedW = Math.max(size.x, size.z) * scale;
            if (projectedW > MAX_WIDTH) scale = MAX_WIDTH / Math.max(size.x, size.z);
            obj.scale.setScalar(scale);

            // 바닥 기준 정렬: 모든 모델의 바닥을 FLOOR_Y에 맞춤
            const box2 = new THREE.Box3().setFromObject(obj);
            const center2 = box2.getCenter(new THREE.Vector3());
            obj.position.x = def.x - center2.x;
            obj.position.y = FLOOR_Y - box2.min.y; // 바닥을 FLOOR_Y에 고정
            obj.position.z = -center2.z;

            obj.rotation.y = def.initY || 0;
            obj.rotation.x = def.flipX ? Math.PI : 0;
            obj.userData.rotSpeed = def.rotSpeed;
            obj.traverse(child => {
              if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
              }
            });

            scene.add(obj);
            objects.push(obj);
            resolve();
          }, undefined, (err) => { console.error('GLB load error:', def.path, err); resolve(); });
        });
      }

      Promise.all(modelDefs.map(loadModel));

      window.addEventListener('resize', () => {
        renderer.setSize(container.clientWidth, container.clientHeight);
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
      });

      (function animate() {
        requestAnimationFrame(animate);
        objects.forEach(obj => { obj.rotation.y += obj.userData.rotSpeed; });
        renderer.render(scene, camera);
      })();
    </script>

    <script>
      // 랜딩 오버레이 숨기기
      function hideLanding() {
        const overlay = document.getElementById("landingOverlay");
        overlay.style.opacity = "0";
        setTimeout(() => {
          overlay.style.display = "none";
        }, 500);
      }

      // 로고 조각 모임 애니메이션 (JS transition — 회전 없음, 크로스브라우저 호환)
      (function () {
        const offsets = [
          [-200, -150], [-180, 100],  [220, 120],  [-150, -80],
          [150, -120],  [-100, 150],  [180, -100], [-220, 80],
          [200, 140],   [-160, -120], [140, 90],   [190, -90],
          [-140, 110],  [210, -60],
        ];
        const pieces = document.querySelectorAll(".logo-piece");
        // 초기 위치 세팅 (transition 없이)
        pieces.forEach(function (piece, i) {
          piece.style.transform = "translate(" + offsets[i][0] + "px, " + offsets[i][1] + "px)";
          piece.style.opacity = "0";
          piece.style.transition = "none";
        });
        // 한 프레임 후 transition 시작
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            pieces.forEach(function (piece, i) {
              var delay = i * 50;
              setTimeout(function () {
                piece.style.transition =
                  "transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease";
                piece.style.transform = "translate(0, 0)";
                piece.style.opacity = "1";
              }, delay);
            });
          });
        });
      })();
    </script>
